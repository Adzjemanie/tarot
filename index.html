<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Detail Extractor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0f; --surface: #16161a; --surface2: #1e1e24;
    --border: #2a2a35; --accent: #7c6af7; --accent2: #f76a8c;
    --text: #e8e8f0; --muted: #7a7a90; --card-w: 220px;
  }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; overflow-x:hidden; }
  header { padding:2.5rem 2rem 1.5rem; text-align:center; }
  header::after { content:''; display:block; width:120px; height:3px; background:linear-gradient(90deg,var(--accent),var(--accent2)); margin:1rem auto 0; border-radius:2px; }
  header h1 { font-size:clamp(1.6rem,4vw,2.4rem); font-weight:700; letter-spacing:-.02em; background:linear-gradient(135deg,#fff 30%,var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  header p { margin-top:.5rem; color:var(--muted); font-size:.95rem; }
  #drop-zone { margin:1.5rem auto; max-width:640px; border:2px dashed var(--border); border-radius:20px; padding:3rem 2rem; text-align:center; cursor:pointer; transition:border-color .25s,background .25s; }
  #drop-zone:hover,#drop-zone.drag-over { border-color:var(--accent); background:rgba(124,106,247,.06); }
  #drop-zone svg { opacity:.5; }
  #drop-zone h2 { font-size:1.1rem; margin:1rem 0 .3rem; }
  #drop-zone p  { color:var(--muted); font-size:.85rem; }
  #file-input { display:none; }
  .btn { display:inline-flex; align-items:center; gap:.4rem; margin-top:1.2rem; padding:.6rem 1.4rem; border-radius:10px; border:none; cursor:pointer; font-size:.9rem; font-weight:600; transition:transform .15s,opacity .15s; }
  .btn:active { transform:scale(.97); }
  .btn-primary { background:linear-gradient(135deg,var(--accent),#9b8bf7); color:#fff; }
  .btn-primary:hover { opacity:.9; }
  .btn-sm { padding:.35rem .8rem; font-size:.78rem; border-radius:7px; }
  .btn-dl { background:rgba(124,106,247,.18); color:var(--accent); border:1px solid rgba(124,106,247,.3); }
  .btn-dl:hover { background:rgba(124,106,247,.3); }
  #preview-section { display:none; max-width:900px; margin:0 auto 2rem; padding:0 1.5rem; }
  #preview-section h2 { font-size:.78rem; color:var(--muted); margin-bottom:.75rem; text-transform:uppercase; letter-spacing:.08em; }
  #preview-wrap { position:relative; display:inline-block; border-radius:14px; overflow:hidden; border:1px solid var(--border); max-width:100%; }
  #preview-img { display:block; max-width:100%; max-height:420px; object-fit:contain; }
  #overlay-canvas { position:absolute; top:0; left:0; pointer-events:none; }
  .controls { display:flex; align-items:center; gap:1rem; flex-wrap:wrap; margin-top:1rem; }
  #status { text-align:center; color:var(--muted); font-size:.85rem; padding:.5rem; min-height:1.6rem; transition:color .3s; }
  #status.working { color:var(--accent); }
  #status.done { color:#6fcf97; }
  #grid-section { display:none; padding:0 1.5rem 4rem; max-width:1400px; margin:0 auto; }
  #grid-section > h2 { font-size:.78rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:1.25rem; }
  #grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(var(--card-w),1fr)); gap:1.25rem; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; display:flex; flex-direction:column; transition:transform .25s,box-shadow .25s,border-color .25s; animation:fadeUp .4s ease both; }
  .card:hover { transform:translateY(-5px); box-shadow:0 16px 40px rgba(0,0,0,.5),0 0 0 1px var(--accent); border-color:var(--accent); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .card-img-wrap { position:relative; overflow:hidden; aspect-ratio:1; background:var(--surface2); }
  .card-img-wrap canvas { width:100%; height:100%; object-fit:cover; display:block; transition:transform .35s ease; }
  .card:hover .card-img-wrap canvas { transform:scale(1.06); }
  .badge { position:absolute; top:8px; left:8px; background:rgba(13,13,15,.75); backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,.12); color:#fff; font-size:.65rem; font-weight:700; padding:.2rem .5rem; border-radius:6px; letter-spacing:.04em; }
  .card-overlay { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(to top,rgba(13,13,15,.96) 60%,transparent); padding:.8rem .75rem .65rem; transform:translateY(101%); transition:transform .3s ease; pointer-events:none; }
  .card:hover .card-overlay { transform:translateY(0); }
  .card-overlay p { font-size:.75rem; color:#ddd; line-height:1.4; }
  .card-body { padding:.75rem .85rem .9rem; flex:1; display:flex; flex-direction:column; gap:.5rem; }
  .card-title { font-size:.88rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-desc { font-size:.75rem; color:var(--muted); line-height:1.45; flex:1; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .card-footer { display:flex; align-items:center; justify-content:space-between; padding:0 .85rem .85rem; }
  .card-coords { font-size:.68rem; color:#444; font-variant-numeric:tabular-nums; }
  @media(max-width:500px){:root{--card-w:160px}#drop-zone{padding:2rem 1rem}}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<header>
  <h1>🔍 Image Detail Extractor</h1>
  <p>Upload een afbeelding — 22 interessante details worden automatisch uitgeknipd &amp; getoond</p>
</header>

<div id="drop-zone">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
    <polyline points="17 8 12 3 7 8"/>
    <line x1="12" y1="3" x2="12" y2="15"/>
  </svg>
  <h2>Sleep een afbeelding hiernaartoe</h2>
  <p>of klik om een bestand te kiezen (JPG, PNG, WEBP)</p>
  <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">📂 Bestand kiezen</button>
  <input type="file" id="file-input" accept="image/*">
</div>

<div id="preview-section">
  <h2>Bronafbeelding</h2>
  <div id="preview-wrap">
    <img id="preview-img" alt="preview">
    <canvas id="overlay-canvas"></canvas>
  </div>
  <div class="controls">
    <button class="btn btn-primary btn-sm" id="reanalyse-btn">🔄 Opnieuw analyseren</button>
    <button class="btn btn-dl btn-sm" id="upload-new-btn">📂 Andere afbeelding</button>
  </div>
</div>

<div id="status"></div>

<div id="grid-section">
  <h2 id="grid-title">22 Gevonden details</h2>
  <div id="grid"></div>
</div>

<canvas id="work-canvas" style="display:none"></canvas>

<script>
const DETAIL_COUNT = 22;
const REGION_LABELS = ["Textuur","Kleuraccent","Lichtval","Schaduwpatroon","Detailvlek","Hoekpunt","Contrast","Vormrand","Kleurovergang","Dieptelaag","Reflexie","Micro-detail","Structuurveld","Toonzone","Scherptegebied","Rand","Patroon","Focuspunt","Achtergrond","Hoogtepunt","Donkerveld","Midtoon"];

function buildDescription(stats, label) {
  const d = {
    "Textuur":        `Rijk gestructureerd vlak met variantie ${stats.variance.toFixed(0)}. Fijne patronen versterken de diepte van het beeld.`,
    "Kleuraccent":    `Opvallende kleurverzadiging (gem. ${stats.saturation.toFixed(0)}%). Dit accent trekt de blik naar de compositie.`,
    "Lichtval":       `Helderheidswaarde ${stats.brightness.toFixed(0)}/255. Zachte lichtval creëert volume en driedimensionaliteit.`,
    "Schaduwpatroon": `Donker vlak (helderheid ${stats.brightness.toFixed(0)}) met subtiele toonverschillen die schaduwstructuur onthullen.`,
    "Detailvlek":     `Kleine zone met hoge lokale activiteit — variantie ${stats.variance.toFixed(0)} — verbergt subtiele informatie.`,
    "Hoekpunt":       `Geometrisch significant punt met rand-energie ${stats.edges.toFixed(0)}. Structureel anker van de compositie.`,
    "Contrast":       `Hoog contrastveld (bereik: ${stats.range}). Sterke toon-overgang definieert volume en diepte.`,
    "Vormrand":       `Rand-energie ${stats.edges.toFixed(0)} — hier ontmoeten twee zones en vormen een visuele grens.`,
    "Kleurovergang":  `Vloeiende kleur- en toon-transitie. Variantie ${stats.variance.toFixed(0)} toont de geleidelijke verandering.`,
    "Dieptelaag":     `Ruimtelijke laag met helderheid ${stats.brightness.toFixed(0)} — onderdeel van de compositie-diepte.`,
    "Reflexie":       `Lichtreflectie (helderheid ${stats.brightness.toFixed(0)}). Materiaalkarakter wordt zichtbaar.`,
    "Micro-detail":   `Fijnste detailniveau — variantie ${stats.variance.toFixed(0)} onthult kleine structuren.`,
    "Structuurveld":  `Repeterend of organisch patroon met rand-energie ${stats.edges.toFixed(0)}.`,
    "Toonzone":       `Brede toonschaal (bereik ${stats.range}) — rijke grijswaardeverdeling.`,
    "Scherptegebied": `Focus-zone: rand-energie ${stats.edges.toFixed(0)} wijst op scherpe overgang — het oog landt hier.`,
    "Rand":           `Visuele grens — rand-energie ${stats.edges.toFixed(0)} — scheidt subject van omgeving.`,
    "Patroon":        `Herhalend element met variantie ${stats.variance.toFixed(0)} en regelmatige structuur.`,
    "Focuspunt":      `Optisch zwaartepunt — hoge activiteit (${stats.variance.toFixed(0)}) maakt dit tot aandachtspunt.`,
    "Achtergrond":    `Laag-actieve zone (variantie ${stats.variance.toFixed(0)}) vormt de rustige basis van de compositie.`,
    "Hoogtepunt":     `Lichtste deel (helderheid ${stats.brightness.toFixed(0)}) — speculair hoogtepunt of directe lichtbron.`,
    "Donkerveld":     `Diepe schaduwzone (helderheid ${stats.brightness.toFixed(0)}) met verborgen detaillagen.`,
    "Midtoon":        `Neutrale midtoonzone (helderheid ${stats.brightness.toFixed(0)}) — de balans van het beeld.`,
  };
  return d[label] || `Interessant segment met variantie ${stats.variance.toFixed(0)}.`;
}

const dropZone   = document.getElementById('drop-zone');
const fileInput  = document.getElementById('file-input');
const previewSec = document.getElementById('preview-section');
const previewImg = document.getElementById('preview-img');
const overlayCvs = document.getElementById('overlay-canvas');
const overlayCtx = overlayCvs.getContext('2d');
const workCvs    = document.getElementById('work-canvas');
const workCtx    = workCvs.getContext('2d');
const statusEl   = document.getElementById('status');
const gridSec    = document.getElementById('grid-section');
const gridEl     = document.getElementById('grid');
const gridTitle  = document.getElementById('grid-title');
let currentImg   = null;

dropZone.addEventListener('dragover', e=>{e.preventDefault();dropZone.classList.add('drag-over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))loadFile(f);});
dropZone.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);});
document.getElementById('reanalyse-btn').addEventListener('click',()=>{if(currentImg)analyse(currentImg);});
document.getElementById('upload-new-btn').addEventListener('click',()=>fileInput.click());

function loadFile(file){
  const url=URL.createObjectURL(file);
  const img=new Image();
  img.onload=()=>{
    currentImg=img;
    previewImg.src=url;
    previewSec.style.display='block';
    dropZone.style.display='none';
    analyse(img);
  };
  img.src=url;
}

function analyse(img){
  setStatus('Afbeelding analyseren…','working');
  gridSec.style.display='none';
  gridEl.innerHTML='';
  const MAX=1200;
  const scale=Math.min(1,MAX/img.width,MAX/img.height);
  const W=Math.round(img.width*scale), H=Math.round(img.height*scale);
  workCvs.width=W; workCvs.height=H;
  workCtx.drawImage(img,0,0,W,H);
  const imgData=workCtx.getImageData(0,0,W,H);

  const COLS=8, ROWS=8;
  const cw=W/COLS, ch=H/ROWS;
  const cells=[];

  for(let row=0;row<ROWS;row++){
    for(let col=0;col<COLS;col++){
      const x=Math.round(col*cw),y=Math.round(row*ch);
      const w=Math.round(cw),h=Math.round(ch);
      const stats=calcStats(imgData,x,y,w,h,W);
      const interest=stats.variance*0.45+stats.edges*0.4+stats.saturation*0.15;
      cells.push({col,row,x,y,w,h,stats,interest});
    }
  }
  cells.sort((a,b)=>b.interest-a.interest);

  const chosen=[];
  for(const c of cells){
    if(chosen.length>=DETAIL_COUNT) break;
    const tooClose=chosen.some(o=>Math.abs(o.col-c.col)<2&&Math.abs(o.row-c.row)<2);
    if(!tooClose) chosen.push(c);
  }
  for(const c of cells){
    if(chosen.length>=DETAIL_COUNT) break;
    if(!chosen.includes(c)) chosen.push(c);
  }

  const sx=img.width/W, sy=img.height/H;
  const regions=chosen.slice(0,DETAIL_COUNT).map((c,i)=>({
    id:i+1, label:REGION_LABELS[i],
    orig:{x:Math.round(c.x*sx),y:Math.round(c.y*sy),w:Math.round(c.w*sx),h:Math.round(c.h*sy)},
    scaled:{x:c.x,y:c.y,w:c.w,h:c.h},
    stats:c.stats
  }));

  drawOverlay(regions,W,H);
  renderGrid(img,regions);
  setStatus(`✓ ${DETAIL_COUNT} details gevonden`,'done');
  gridTitle.textContent=`${DETAIL_COUNT} Gevonden details`;
  gridSec.style.display='block';
  setTimeout(()=>gridSec.scrollIntoView({behavior:'smooth',block:'start'}),100);
}

function calcStats(imgData,x,y,w,h,imgW){
  const d=imgData.data;
  let sumR=0,sumG=0,sumB=0,count=0;
  const vals=[];
  for(let py=y;py<y+h;py++){
    for(let px=x;px<x+w;px++){
      const i=(py*imgW+px)*4;
      const r=d[i],g=d[i+1],b=d[i+2];
      const lum=0.299*r+0.587*g+0.114*b;
      vals.push(lum);
      sumR+=r;sumG+=g;sumB+=b;count++;
    }
  }
  if(!count) return{variance:0,edges:0,saturation:0,brightness:0,range:0};
  const brightness=(sumR+sumG+sumB)/(3*count);
  const mean=vals.reduce((a,b)=>a+b,0)/vals.length;
  const variance=vals.reduce((s,v)=>s+(v-mean)**2,0)/vals.length;
  const min=Math.min(...vals),max=Math.max(...vals);
  let edgeSum=0,edgeCount=0;
  for(let py=y+1;py<y+h-1;py++){
    for(let px=x+1;px<x+w-1;px++){
      const i=(py*imgW+px)*4,ih=(py*imgW+px+1)*4,iv=((py+1)*imgW+px)*4;
      const lC=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
      const lH=0.299*d[ih]+0.587*d[ih+1]+0.114*d[ih+2];
      const lV=0.299*d[iv]+0.587*d[iv+1]+0.114*d[iv+2];
      edgeSum+=Math.abs(lC-lH)+Math.abs(lC-lV);edgeCount++;
    }
  }
  const edges=edgeCount?edgeSum/edgeCount:0;
  const avgR=sumR/count,avgG=sumG/count,avgB=sumB/count;
  const cmax=Math.max(avgR,avgG,avgB)/255,cmin=Math.min(avgR,avgG,avgB)/255;
  const saturation=cmax?((cmax-cmin)/cmax)*100:0;
  return{variance,edges,saturation,brightness,range:Math.round(max-min)};
}

function drawOverlay(regions,W,H){
  function draw(){
    const dw=previewImg.offsetWidth,dh=previewImg.offsetHeight;
    overlayCvs.width=dw;overlayCvs.height=dh;
    overlayCvs.style.width=dw+'px';overlayCvs.style.height=dh+'px';
    const sx=dw/W,sy=dh/H;
    overlayCtx.clearRect(0,0,dw,dh);
    regions.forEach((r,i)=>{
      const{x,y,w,h}=r.scaled;
      const hue=(i/DETAIL_COUNT)*280;
      overlayCtx.strokeStyle=`hsla(${hue},90%,65%,.85)`;
      overlayCtx.lineWidth=1.5;
      overlayCtx.strokeRect(x*sx,y*sy,w*sx,h*sy);
      overlayCtx.fillStyle=`hsla(${hue},90%,65%,.9)`;
      overlayCtx.font='bold 9px monospace';
      overlayCtx.fillText(r.id,x*sx+3,y*sy+10);
    });
  }
  if(previewImg.complete) draw();
  else previewImg.addEventListener('load',draw,{once:true});
}

function renderGrid(img,regions){
  gridEl.innerHTML='';
  regions.forEach((r,i)=>{
    const hue=(i/DETAIL_COUNT)*280;
    const cvs=document.createElement('canvas');
    const size=400;cvs.width=size;cvs.height=size;
    const ctx=cvs.getContext('2d');
    const{x,y,w,h}=r.orig;
    const sq=Math.min(w,h);
    ctx.drawImage(img,x+(w-sq)/2,y+(h-sq)/2,sq,sq,0,0,size,size);
    const dispCvs=document.createElement('canvas');
    dispCvs.width=220;dispCvs.height=220;
    dispCvs.getContext('2d').drawImage(cvs,0,0,220,220);
    const desc=buildDescription(r.stats,r.label);

    const card=document.createElement('div');
    card.className='card';
    card.style.animationDelay=(i*0.045)+'s';

    const imgWrap=document.createElement('div');
    imgWrap.className='card-img-wrap';
    imgWrap.appendChild(dispCvs);

    const badge=document.createElement('span');
    badge.className='badge';
    badge.textContent='#'+r.id;
    badge.style.borderColor=`hsla(${hue},80%,65%,.4)`;
    imgWrap.appendChild(badge);

    const overlay=document.createElement('div');
    overlay.className='card-overlay';
    overlay.innerHTML=`<p>${desc}</p>`;
    imgWrap.appendChild(overlay);

    const body=document.createElement('div');
    body.className='card-body';
    body.innerHTML=`<div class="card-title">${r.label}</div><div class="card-desc">${desc}</div>`;

    const footer=document.createElement('div');
    footer.className='card-footer';
    const coords=document.createElement('span');
    coords.className='card-coords';
    coords.textContent=`${r.orig.x},${r.orig.y} · ${r.orig.w}×${r.orig.h}`;
    const dlBtn=document.createElement('button');
    dlBtn.className='btn btn-dl btn-sm';
    dlBtn.innerHTML='⬇ Download';
    dlBtn.addEventListener('click',()=>downloadCanvas(cvs,`detail-${r.id}-${r.label}.png`));
    footer.appendChild(coords);footer.appendChild(dlBtn);

    card.appendChild(imgWrap);card.appendChild(body);card.appendChild(footer);
    gridEl.appendChild(card);
  });
}

function downloadCanvas(cvs,filename){
  cvs.toBlob(blob=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=filename;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),5000);
  },'image/png');
}

function setStatus(msg,cls=''){statusEl.textContent=msg;statusEl.className=cls;}
</script>
</body>
</html>
